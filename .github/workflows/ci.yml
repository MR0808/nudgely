name: CI

on:
    push:
        branches: [main, master]
    pull_request:

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci

            - run: npx prisma generate

            - run: npm run lint

            - run: npm test

            - run: npx tsc --noEmit

            - run: npm run build
              env:
                  # Accelerate-shaped URL satisfies lib/prisma.ts at build time (no DB connection needed)
                  DATABASE_URL: prisma+postgres://localhost:51213/?api_key=ci_dummy
                  DIRECT_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
                  BETTER_AUTH_SECRET: ci-build-secret-minimum-32-chars-long
                  NEXT_PUBLIC_APP_URL: http://localhost:3000
